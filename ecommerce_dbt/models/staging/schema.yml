version: 2

models:
  - name: stg_customers
    description: "Cleaned customer data from RAW layer"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null
      - name: country
        tests:
          - not_null
      - name: age_group
        tests:
          - accepted_values:
              values: ['Youth', 'Adult', 'Senior', 'Unknown']

  - name: stg_orders
    description: "Cleaned orders data from RAW layer"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'returned']
      - name: amount
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned products data from RAW layer"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: price
        tests:
          - not_null