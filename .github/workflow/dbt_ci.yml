name: DBT CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install DBT
        run: uv pip install dbt-core dbt-snowflake --system

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ecommerce_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ACCOUNTADMIN
                warehouse: ECOMMERCE_WH
                database: ECOMMERCE_DB
                schema: DBT_DEV
                threads: 1
          EOF

      - name: DBT Debug
        working-directory: ecommerce_dbt
        run: dbt debug

      - name: DBT Run
        working-directory: ecommerce_dbt
        run: dbt run

      - name: DBT Test
        working-directory: ecommerce_dbt
        run: dbt test --select staging